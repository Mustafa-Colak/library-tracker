<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Kutuphane</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>&#128218;</span> <span data-i18n="app.name">e-Kutuphane</span></div>
    <div class="sidebar-user" id="userInfo"></div>
    <nav class="sidebar-nav">
      <a href="/index.html"><span class="icon">&#127968;</span><span data-i18n="nav.dashboard">Dashboard</span></a>
      <a href="/books.html"><span class="icon">&#128214;</span><span data-i18n="nav.books">Kitaplar</span></a>
      <a href="/members.html"><span class="icon">&#128101;</span><span data-i18n="nav.members">Uyeler</span></a>
      <a href="/loans.html" class="active"><span class="icon">&#128260;</span><span data-i18n="nav.loans">Odunc Islemleri</span></a>
      <a href="/reports.html" data-role="admin,operator"><span class="icon">&#128202;</span><span data-i18n="nav.reports">Raporlar</span></a>
      <a href="/users.html" data-role="admin"><span class="icon">&#128100;</span><span data-i18n="nav.users">Kullanicilar</span></a>
      <a href="/settings.html" data-role="admin"><span class="icon">&#9881;</span><span data-i18n="nav.settings">Ayarlar</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switch">
        <button data-lang="tr" onclick="switchLang('tr')">TR</button>
        <button data-lang="en" onclick="switchLang('en')">EN</button>
        <button data-lang="ar" onclick="switchLang('ar')">AR</button>
      </div>
      <div class="sidebar-version" id="appVersion"></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h1 data-i18n="loan.title">Odunc Islemleri</h1>
    </div>

    <div class="loan-panel" data-role="admin,operator">
      <h3 data-i18n="loan.new_loan">Yeni Odunc</h3>
      <div class="loan-steps">
        <div class="loan-step active" id="step1">
          <div class="step-number">1</div>
          <span data-i18n="loan.scan_member">Uye Karti Okut</span>
        </div>
        <div class="step-arrow">&#8594;</div>
        <div class="loan-step" id="step2">
          <div class="step-number">2</div>
          <span data-i18n="loan.scan_book">Kitap Barkodu Okut</span>
        </div>
        <div class="step-arrow">&#8594;</div>
        <div class="loan-step" id="step3">
          <div class="step-number">3</div>
          <span data-i18n="loan.give_book">Kitap Ver</span>
        </div>
      </div>
      <div class="loan-scan">
        <div class="form-group">
          <label data-i18n="loan.scan_member">Uye Karti Okut</label>
          <input type="text" id="memberBarcode" class="form-control" placeholder="Uye no veya barkod...">
        </div>
        <div class="form-group">
          <label data-i18n="loan.scan_book">Kitap Barkodu Okut</label>
          <input type="text" id="bookBarcode" class="form-control" placeholder="ISBN veya barkod...">
        </div>
        <button class="btn btn-primary" onclick="createLoan()" data-i18n="loan.give_book">Kitap Ver</button>
        <button class="btn btn-outline" onclick="clearLoanForm()" data-i18n="common.clear">Temizle</button>
      </div>
      <div id="memberInfo" class="member-info" style="display:none;"></div>
      <div id="bookInfo" class="book-info" style="display:none;"></div>
    </div>

    <div class="search-bar">
      <select id="statusFilter" class="form-control" onchange="filterLoans()">
        <option value="" data-i18n="loan.all_status">Tum Durumlar</option>
        <option value="active" data-i18n="loan.status_active">Aktif</option>
        <option value="overdue" data-i18n="loan.status_overdue">Gecikmis</option>
        <option value="returned" data-i18n="loan.status_returned">Iade Edildi</option>
      </select>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th data-i18n="loan.member">Uye</th>
            <th data-i18n="loan.book">Kitap</th>
            <th data-i18n="loan.borrowed_date">Odunc Tarihi</th>
            <th data-i18n="loan.due_date">Iade Tarihi</th>
            <th data-i18n="loan.returned_date">Iade Edildi</th>
            <th data-i18n="loan.status">Durum</th>
            <th data-i18n="common.actions">Islemler</th>
          </tr>
        </thead>
        <tbody id="loansTable"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/barcode.js"></script>
<script src="/js/loans.js"></script>
</body>
</html>
