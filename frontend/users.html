<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Kutuphane</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>&#128218;</span> <span data-i18n="app.name">e-Kutuphane</span></div>
    <div class="sidebar-user" id="userInfo"></div>
    <nav class="sidebar-nav">
      <a href="/index.html"><span class="icon">&#127968;</span><span data-i18n="nav.dashboard">Dashboard</span></a>
      <a href="/books.html"><span class="icon">&#128214;</span><span data-i18n="nav.books">Kitaplar</span></a>
      <a href="/members.html"><span class="icon">&#128101;</span><span data-i18n="nav.members">Uyeler</span></a>
      <a href="/loans.html"><span class="icon">&#128260;</span><span data-i18n="nav.loans">Odunc Islemleri</span></a>
      <a href="/reports.html" data-role="admin,operator"><span class="icon">&#128202;</span><span data-i18n="nav.reports">Raporlar</span></a>
      <a href="/users.html" class="active" data-role="admin"><span class="icon">&#128100;</span><span data-i18n="nav.users">Kullanicilar</span></a>
      <a href="/settings.html" data-role="admin"><span class="icon">&#9881;</span><span data-i18n="nav.settings">Ayarlar</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switch">
        <button data-lang="tr" onclick="switchLang('tr')">TR</button>
        <button data-lang="en" onclick="switchLang('en')">EN</button>
        <button data-lang="ar" onclick="switchLang('ar')">AR</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h1 data-i18n="user.title">Kullanici Yonetimi</h1>
      <button class="btn btn-primary" onclick="openAddUser()">+ <span data-i18n="user.add">Kullanici Ekle</span></button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th data-i18n="user.username">Kullanici Adi</th>
            <th data-i18n="user.full_name">Ad Soyad</th>
            <th data-i18n="user.role">Rol</th>
            <th data-i18n="common.status">Durum</th>
            <th data-i18n="common.actions">Islemler</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </main>
</div>

<dialog id="userDialog">
  <div class="dialog-header">
    <h2 id="userDialogTitle" data-i18n="user.add">Kullanici Ekle</h2>
    <button class="dialog-close" onclick="document.getElementById('userDialog').close()">&times;</button>
  </div>
  <form id="userForm">
    <div class="dialog-body">
      <input type="hidden" id="userId">
      <div class="form-group">
        <label data-i18n="user.username">Kullanici Adi</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="form-group">
        <label data-i18n="user.full_name">Ad Soyad</label>
        <input type="text" id="fullName" class="form-control" required>
      </div>
      <div class="form-group">
        <label data-i18n="user.role">Rol</label>
        <select id="role" class="form-control" required>
          <option value="admin" data-i18n="auth.role_admin">Yonetici</option>
          <option value="operator" data-i18n="auth.role_operator">Operator</option>
          <option value="user" data-i18n="auth.role_user">Kullanici</option>
        </select>
      </div>
      <div class="form-group" id="passwordGroup">
        <label data-i18n="user.password">Sifre</label>
        <input type="password" id="password" class="form-control">
        <small id="passwordHint" class="text-muted" data-i18n="user.password_hint">Bos birakirsaniz sifre degismez</small>
      </div>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-outline" onclick="document.getElementById('userDialog').close()" data-i18n="common.cancel">Iptal</button>
      <button type="submit" class="btn btn-primary" data-i18n="common.save">Kaydet</button>
    </div>
  </form>
</dialog>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/users.js"></script>
</body>
</html>
