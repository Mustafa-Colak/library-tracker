<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Kutuphane</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>&#128218;</span> <span data-i18n="app.name">e-Kutuphane</span></div>
    <div class="sidebar-user" id="userInfo"></div>
    <nav class="sidebar-nav">
      <a href="/index.html"><span class="icon">&#127968;</span><span data-i18n="nav.dashboard">Dashboard</span></a>
      <a href="/books.html"><span class="icon">&#128214;</span><span data-i18n="nav.books">Kitaplar</span></a>
      <a href="/members.html"><span class="icon">&#128101;</span><span data-i18n="nav.members">Uyeler</span></a>
      <a href="/loans.html"><span class="icon">&#128260;</span><span data-i18n="nav.loans">Odunc Islemleri</span></a>
      <a href="/reports.html" class="active"><span class="icon">&#128202;</span><span data-i18n="nav.reports">Raporlar</span></a>
      <a href="/users.html" data-role="admin"><span class="icon">&#128100;</span><span data-i18n="nav.users">Kullanicilar</span></a>
      <a href="/settings.html" data-role="admin"><span class="icon">&#9881;</span><span data-i18n="nav.settings">Ayarlar</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switch">
        <button data-lang="tr" onclick="switchLang('tr')">TR</button>
        <button data-lang="en" onclick="switchLang('en')">EN</button>
        <button data-lang="ar" onclick="switchLang('ar')">AR</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h1 data-i18n="report.title">Raporlar</h1>
    </div>

    <div class="stats-grid">
      <div class="stat-card stat-books">
        <div class="stat-icon">&#128214;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.total_books">Toplam Kitap</div>
          <div class="value" id="totalBooks">-</div>
        </div>
      </div>
      <div class="stat-card stat-titles">
        <div class="stat-icon">&#128218;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.unique_titles">Benzersiz Eser</div>
          <div class="value" id="uniqueTitles">-</div>
        </div>
      </div>
      <div class="stat-card stat-members">
        <div class="stat-icon">&#128101;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.total_members">Aktif Uye</div>
          <div class="value" id="totalMembers">-</div>
        </div>
      </div>
      <div class="stat-card stat-loans">
        <div class="stat-icon">&#128260;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.active_loans">Aktif Odunc</div>
          <div class="value" id="activeLoans">-</div>
        </div>
      </div>
      <div class="stat-card stat-overdue">
        <div class="stat-icon">&#9888;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.overdue_loans">Gecikmis Iade</div>
          <div class="value" id="overdueLoans">-</div>
        </div>
      </div>
    </div>

    <div class="table-container" style="margin-bottom: 1.5rem;">
      <div class="table-header"><h3 data-i18n="report.popular_books">En Cok Okunan Kitaplar</h3></div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th data-i18n="book.book_title">Baslik</th>
            <th data-i18n="book.author">Yazar</th>
            <th data-i18n="report.loan_count">Odunc Sayisi</th>
          </tr>
        </thead>
        <tbody id="popularBooksTable"></tbody>
      </table>
    </div>

    <div class="table-container">
      <div class="table-header"><h3 data-i18n="report.overdue_list">Gecikmis Iadeler</h3></div>
      <table>
        <thead>
          <tr>
            <th data-i18n="loan.member">Uye</th>
            <th data-i18n="loan.book">Kitap</th>
            <th data-i18n="loan.due_date">Iade Tarihi</th>
            <th data-i18n="report.days_late">Gecikme</th>
            <th data-i18n="common.actions">Islemler</th>
          </tr>
        </thead>
        <tbody id="overdueTable"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/reports.js"></script>
</body>
</html>
