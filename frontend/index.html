<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Kutuphane</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>&#128218;</span> <span data-i18n="app.name">e-Kutuphane</span>
    </div>
    <div class="sidebar-user" id="userInfo"></div>
    <nav class="sidebar-nav">
      <a href="/index.html" class="active">
        <span class="icon">&#127968;</span>
        <span data-i18n="nav.dashboard">Dashboard</span>
      </a>
      <a href="/books.html">
        <span class="icon">&#128214;</span>
        <span data-i18n="nav.books">Kitaplar</span>
      </a>
      <a href="/members.html">
        <span class="icon">&#128101;</span>
        <span data-i18n="nav.members">Uyeler</span>
      </a>
      <a href="/loans.html">
        <span class="icon">&#128260;</span>
        <span data-i18n="nav.loans">Odunc Islemleri</span>
      </a>
      <a href="/reports.html" data-role="admin,operator">
        <span class="icon">&#128202;</span>
        <span data-i18n="nav.reports">Raporlar</span>
      </a>
      <a href="/users.html" data-role="admin">
        <span class="icon">&#128100;</span>
        <span data-i18n="nav.users">Kullanicilar</span>
      </a>
      <a href="/settings.html" data-role="admin">
        <span class="icon">&#9881;</span>
        <span data-i18n="nav.settings">Ayarlar</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switch">
        <button data-lang="tr" onclick="switchLang('tr')">TR</button>
        <button data-lang="en" onclick="switchLang('en')">EN</button>
        <button data-lang="ar" onclick="switchLang('ar')">AR</button>
      </div>
      <div class="sidebar-version" id="appVersion"></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h1 data-i18n="dashboard.title">Dashboard</h1>
    </div>

    <div id="updateBanner" class="update-banner" style="display:none">
      <div class="update-banner-content">
        <span class="update-icon">&#x1F4E6;</span>
        <div class="update-text">
          <strong data-i18n="update.available">Yeni surum mevcut!</strong>
          <span id="updateVersionInfo"></span>
          <span class="update-how" data-i18n="update.how_to"></span>
        </div>
        <button class="update-dismiss" onclick="dismissUpdate()" title="&#x2715;">&#x2715;</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card stat-books">
        <div class="stat-icon">&#128214;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.total_books">Toplam Kitap</div>
          <div class="value" id="totalBooks">-</div>
        </div>
      </div>
      <div class="stat-card stat-titles">
        <div class="stat-icon">&#128218;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.unique_titles">Benzersiz Eser</div>
          <div class="value" id="uniqueTitles">-</div>
        </div>
      </div>
      <div class="stat-card stat-members">
        <div class="stat-icon">&#128101;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.total_members">Aktif Uye</div>
          <div class="value" id="totalMembers">-</div>
        </div>
      </div>
      <div class="stat-card stat-loans">
        <div class="stat-icon">&#128260;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.active_loans">Aktif Odunc</div>
          <div class="value" id="activeLoans">-</div>
        </div>
      </div>
      <div class="stat-card stat-overdue">
        <div class="stat-icon">&#9888;</div>
        <div class="stat-info">
          <div class="label" data-i18n="dashboard.overdue_loans">Gecikmis Iade</div>
          <div class="value" id="overdueLoans">-</div>
        </div>
      </div>
    </div>

    <div class="table-container" data-role="admin,operator">
      <div class="table-header">
        <h3 data-i18n="dashboard.recent_overdue">Gecikmis Iadeler</h3>
      </div>
      <table>
        <thead>
          <tr>
            <th data-i18n="loan.member">Uye</th>
            <th data-i18n="loan.book">Kitap</th>
            <th data-i18n="loan.due_date">Iade Tarihi</th>
            <th data-i18n="report.days_late">Gecikme</th>
            <th data-i18n="common.actions">Islemler</th>
          </tr>
        </thead>
        <tbody id="overdueTable"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script>
async function loadDashboard() {
  try {
    const data = await apiGet('/api/reports/summary');
    document.getElementById('totalBooks').textContent = data.total_books;
    document.getElementById('uniqueTitles').textContent = data.unique_titles;
    document.getElementById('totalMembers').textContent = data.total_members;
    document.getElementById('activeLoans').textContent = data.active_loans;
    document.getElementById('overdueLoans').textContent = data.overdue_loans;
  } catch (e) {
    showToast(e.message, 'error');
  }

  if (!hasRole('admin', 'operator')) return;

  showTableLoading('overdueTable', 5);
  try {
    const loans = await apiGet('/api/reports/overdue');
    const tbody = document.getElementById('overdueTable');
    if (!loans.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state">
        <div class="empty-icon">&#128366;</div>
        <p>${t('common.no_data')}</p>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = loans.slice(0, 5).map(l => {
      const due = new Date(l.due_date);
      const daysLate = Math.floor((new Date() - due) / (1000 * 60 * 60 * 24));
      const memberName = l.member ? `${esc(l.member.name)} ${esc(l.member.surname)}` : l.member_id;
      const bookTitle = l.book ? esc(l.book.title) : l.book_id;
      return `<tr>
        <td>${memberName}</td>
        <td>${bookTitle}</td>
        <td>${due.toLocaleDateString()}</td>
        <td><span class="badge badge-overdue">${daysLate} ${t('report.days')}</span></td>
        <td class="actions">
          <button class="btn btn-success btn-sm" onclick="returnFromDashboard(${l.id})">${t('loan.return')}</button>
        </td>
      </tr>`;
    }).join('');
  } catch (e) { /* ignore */ }
}

async function returnFromDashboard(loanId) {
  const ok = await showConfirm(t('loan.confirm_return'));
  if (!ok) return;
  try {
    await apiPut(`/api/loans/${loanId}/return`, {});
    showToast(t('loan.returned'));
    loadDashboard();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function checkForUpdates() {
  if (!hasRole('admin')) return;
  // Don't check if dismissed in this session
  if (sessionStorage.getItem('update_dismissed')) return;
  try {
    const data = await apiGet('/api/system/version');
    if (data.update_available) {
      document.getElementById('updateVersionInfo').textContent =
        `v${data.current_version} → v${data.latest_version}`;
      document.getElementById('updateBanner').style.display = '';
    }
  } catch (e) { /* silently ignore — update check is non-critical */ }
}

function dismissUpdate() {
  document.getElementById('updateBanner').style.display = 'none';
  sessionStorage.setItem('update_dismissed', '1');
}

document.addEventListener('DOMContentLoaded', async () => {
  await i18nReady;
  if (!initAuth()) return;
  loadDashboard();
  checkForUpdates();
});
</script>
</body>
</html>
