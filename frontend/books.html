<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Kutuphane</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>&#128218;</span> <span data-i18n="app.name">e-Kutuphane</span></div>
    <div class="sidebar-user" id="userInfo"></div>
    <nav class="sidebar-nav">
      <a href="/index.html"><span class="icon">&#127968;</span><span data-i18n="nav.dashboard">Dashboard</span></a>
      <a href="/books.html" class="active"><span class="icon">&#128214;</span><span data-i18n="nav.books">Kitaplar</span></a>
      <a href="/members.html"><span class="icon">&#128101;</span><span data-i18n="nav.members">Uyeler</span></a>
      <a href="/loans.html"><span class="icon">&#128260;</span><span data-i18n="nav.loans">Odunc Islemleri</span></a>
      <a href="/reports.html" data-role="admin,operator"><span class="icon">&#128202;</span><span data-i18n="nav.reports">Raporlar</span></a>
      <a href="/users.html" data-role="admin"><span class="icon">&#128100;</span><span data-i18n="nav.users">Kullanicilar</span></a>
      <a href="/settings.html" data-role="admin"><span class="icon">&#9881;</span><span data-i18n="nav.settings">Ayarlar</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switch">
        <button data-lang="tr" onclick="switchLang('tr')">TR</button>
        <button data-lang="en" onclick="switchLang('en')">EN</button>
        <button data-lang="ar" onclick="switchLang('ar')">AR</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h1 data-i18n="book.title">Kitap Yonetimi</h1>
      <button class="btn btn-primary" onclick="openAddBook()" data-role="admin,operator">+ <span data-i18n="book.add">Kitap Ekle</span></button>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" class="form-control" data-i18n="common.search" placeholder="Ara..." onkeyup="if(event.key==='Enter')searchBooks()">
      <select id="categoryFilter" class="form-control" onchange="searchBooks()">
        <option value="" data-i18n="book.all_categories">Tum Kategoriler</option>
        <option value="Roman">Roman</option>
        <option value="Bilim">Bilim</option>
        <option value="Tarih">Tarih</option>
        <option value="Cocuk">Cocuk</option>
        <option value="Ders Kitabi">Ders Kitabi</option>
        <option value="Diger">Diger</option>
      </select>
      <button class="btn btn-outline" onclick="searchBooks()" data-i18n="common.search_btn">Ara</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ISBN</th>
            <th data-i18n="book.book_title">Baslik</th>
            <th data-i18n="book.author">Yazar</th>
            <th data-i18n="book.category">Kategori</th>
            <th data-i18n="book.shelf">Raf</th>
            <th data-i18n="book.total">Toplam</th>
            <th data-i18n="book.available">Mevcut</th>
            <th data-i18n="common.actions">Islemler</th>
          </tr>
        </thead>
        <tbody id="booksTable"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>
</div>

<dialog id="bookDialog">
  <div class="dialog-header">
    <h2 id="bookDialogTitle" data-i18n="book.add">Kitap Ekle</h2>
    <button class="dialog-close" onclick="document.getElementById('bookDialog').close()">&times;</button>
  </div>
  <form id="bookForm">
    <div class="dialog-body">
      <input type="hidden" id="bookId">
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="book.isbn">ISBN</label>
          <input type="text" id="isbn" class="form-control" required>
        </div>
        <div class="form-group">
          <label data-i18n="book.book_title">Baslik</label>
          <input type="text" id="title" class="form-control" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="book.author">Yazar</label>
          <input type="text" id="author" class="form-control" required>
        </div>
        <div class="form-group">
          <label data-i18n="book.publisher">Yayinevi</label>
          <input type="text" id="publisher" class="form-control">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="book.year">Yil</label>
          <input type="number" id="year" class="form-control" min="1000" max="2100">
        </div>
        <div class="form-group">
          <label data-i18n="book.category">Kategori</label>
          <select id="category" class="form-control">
            <option value="">-</option>
            <option value="Roman">Roman</option>
            <option value="Bilim">Bilim</option>
            <option value="Tarih">Tarih</option>
            <option value="Cocuk">Cocuk</option>
            <option value="Ders Kitabi">Ders Kitabi</option>
            <option value="Diger">Diger</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="book.shelf">Raf Konumu</label>
          <input type="text" id="shelfLocation" class="form-control">
        </div>
        <div class="form-group">
          <label data-i18n="book.total_copies">Kopya Sayisi</label>
          <input type="number" id="totalCopies" class="form-control" value="1" min="1">
        </div>
      </div>
    </div>
    <div class="dialog-footer">
      <button type="button" class="btn btn-outline" onclick="document.getElementById('bookDialog').close()" data-i18n="common.cancel">Iptal</button>
      <button type="submit" class="btn btn-primary" data-i18n="common.save">Kaydet</button>
    </div>
  </form>
</dialog>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/books.js"></script>
</body>
</html>
