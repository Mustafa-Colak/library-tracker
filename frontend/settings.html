<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Kutuphane</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>&#128218;</span> <span data-i18n="app.name">e-Kutuphane</span></div>
    <div class="sidebar-user" id="userInfo"></div>
    <nav class="sidebar-nav">
      <a href="/index.html"><span class="icon">&#127968;</span><span data-i18n="nav.dashboard">Dashboard</span></a>
      <a href="/books.html"><span class="icon">&#128214;</span><span data-i18n="nav.books">Kitaplar</span></a>
      <a href="/members.html"><span class="icon">&#128101;</span><span data-i18n="nav.members">Uyeler</span></a>
      <a href="/loans.html"><span class="icon">&#128260;</span><span data-i18n="nav.loans">Odunc Islemleri</span></a>
      <a href="/reports.html" data-role="admin,operator"><span class="icon">&#128202;</span><span data-i18n="nav.reports">Raporlar</span></a>
      <a href="/users.html" data-role="admin"><span class="icon">&#128100;</span><span data-i18n="nav.users">Kullanicilar</span></a>
      <a href="/settings.html" class="active" data-role="admin"><span class="icon">&#9881;</span><span data-i18n="nav.settings">Ayarlar</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switch">
        <button data-lang="tr" onclick="switchLang('tr')">TR</button>
        <button data-lang="en" onclick="switchLang('en')">EN</button>
        <button data-lang="ar" onclick="switchLang('ar')">AR</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h1 data-i18n="settings.title">Ayarlar</h1>
    </div>

    <div class="settings-section">
      <h3 data-i18n="settings.branding">Kurum Markasi</h3>
      <p class="text-muted" data-i18n="settings.branding_desc">Kurum adi ve logonuzu ayarlayin.</p>

      <div class="form-group" style="margin-top: 1rem;">
        <label data-i18n="settings.org_name">Kurum Adi</label>
        <div style="display: flex; gap: .5rem;">
          <input type="text" id="orgName" class="form-control" placeholder="Ornek: Ataturk Ilkokulu">
          <button class="btn btn-primary" onclick="saveOrgName()" data-i18n="common.save">Kaydet</button>
        </div>
      </div>

      <div class="form-group" style="margin-top: 1.5rem;">
        <label data-i18n="settings.logo">Logo</label>
        <div class="logo-upload-area">
          <div id="logoPreview" class="logo-preview">
            <span class="empty-logo">&#128247;</span>
          </div>
          <div class="logo-actions">
            <input type="file" id="logoFile" accept="image/*" style="display:none;" onchange="uploadLogo()">
            <button class="btn btn-outline" onclick="document.getElementById('logoFile').click()" data-i18n="settings.upload_logo">Logo Yukle</button>
            <button class="btn btn-danger btn-sm" id="deleteLogo" onclick="deleteLogo()" style="display:none;" data-i18n="settings.delete_logo">Logoyu Sil</button>
          </div>
        </div>
      </div>
    </div>

    <div class="settings-section" style="margin-top: 2rem;">
      <h3 data-i18n="auth.change_password">Sifre Degistir</h3>
      <form id="passwordForm" style="max-width: 400px;">
        <div class="form-group">
          <label data-i18n="auth.current_password">Mevcut Sifre</label>
          <input type="password" id="currentPassword" class="form-control" required>
        </div>
        <div class="form-group">
          <label data-i18n="auth.new_password">Yeni Sifre</label>
          <input type="password" id="newPassword" class="form-control" required minlength="4">
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="auth.change_password">Sifre Degistir</button>
      </form>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/settings.js"></script>
</body>
</html>
